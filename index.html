<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Prabavathi S is an aspiring software developer sharing a professional portfolio with skills, certifications, and contact information." />
    <meta name="theme-color" content="#f8f6ef" />
    <title>Prabavathi S | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <!-- EmailJS CDN script for contact form email delivery -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <!-- EmailJS values are configured in script.js: EMAILJS_TEMPLATE_ID and EMAILJS_PUBLIC_KEY -->
  </head>
  <body>
    <div class="loader" id="loader">
      <div class="loader-ring"></div>
    </div>

    <header class="site-header">
      <a href="#home" class="brand">Prabavathi S</a>
      <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <i class="fa-solid fa-bars"></i>
      </button>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#certifications">Certifications</a>
        <a href="#contact">Contact</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon"></i>
      </button>
    </header>

    <main id="app"></main>

    <button class="back-to-top" id="backToTop" aria-label="Go to top">
      <i class="fa-solid fa-arrow-up"></i>
    </button>

    <script type="module" src="script.js"></script>

</html>
